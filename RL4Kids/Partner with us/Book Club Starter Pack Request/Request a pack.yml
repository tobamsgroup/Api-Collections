    data: |-
      {
        "firstName": "Jane",
        "lastName": "Doe",
        "email": "jane.doe@example.com",
        "organization": "Green Schools",
        "intendedUse": "Community",
        "numberOfChildren": 15,
        "packType": "Digital"
