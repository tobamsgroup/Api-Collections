info:
  name: Create a partner form
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/partner-applications"
  body:
    type: json
    data: |-
      {
            "organisationInfo": {
              "name": "Future Leaders Foundation",
              "type": "NGO",
              "contactPersonName": "Aisha Mohammed",
              "contactPersonRole": "Program Coordinator",
              "email": "sulaiman@futureleader.org",
              "phoneNumber": "+2348034567890",
              "country": "Nigeria"
            },
            "partnershipDetails": {
              "formOfPartnership": "Collaborate to Develop Custom Educational Solutions",
              "studentAgeGroup": "7-14",
              "programsOfInterest": ["Think Sustainability", "Think Entrepreneurship", "Think Technology", "Think Strategy"],
              "estimatedStudents": 500,
              "goal": "To provide free technology education to underprivileged children in our community",
              "questionsOrComments": "We would like to know more about the teacher training program"
            }
          }
  auth:
    type: bearer
    token: "{{access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

