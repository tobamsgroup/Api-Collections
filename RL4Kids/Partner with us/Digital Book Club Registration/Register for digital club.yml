info:
  name: Register for digital club
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/digital-book-clubs"
  body:
    type: json
    data: |-
      {
            "basicInfo": {
              "guardianName": "Aisha Mohammed",
              "email": "aisha.m@example.com",
              "childName": "Fatima Mohammed",
              "childAge": 10,
              "country": "Nigeria",
              "state": "Kano",
              "city": "Kano"
            },
            "additionalInfo": {
              "preferredSessionTime": [
                "Saturday Afternoons",
                "Sunday Mornings"
              ],
              "seriesCategory": [
                "Think Sustainability"
              ],
              "seriesType": [
                "Interactive Stories"
              ],
              "howDidYouHearAboutUs": "School Newsletter"
            }
          }
  auth:
    type: bearer
    token: "{{access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

