info:
  name: Create an application
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/book-club-ambassadors"
  body:
    type: multipart-form
    data:
      - name: firstName
        type: text
        value: Jane
      - name: lastName
        type: text
        value: Doe
      - name: email
        type: text
        value: jane.adoe@example.com
      - name: phoneNumber
        type: text
        value: "+2348012345678"
      - name: country
        type: text
        value: Nigeria
      - name: state
        type: text
        value: Lagos
      - name: city
        type: text
        value: Ikeja
      - name: educationExperience
        type: text
        value: 5 years teaching English in secondary school.
      - name: ambassadorReason
        type: text
        value: I want to inspire a love of reading in my community.
      - name: file
        type: file
        value:
          - postman-cloud:///1ef90d38-f8eb-4bd0-aa84-02f9d1b40ded
      - name: intendedBookClubType
        type: text
        value: Local Book Club
      - name: organisationName
        type: text
        value: Green Schools
      - name: organisationType
        type: text
        value: School
      - name: intendedStartDate
        type: text
        value: 2024-09-01
      - name: requiredBookManual
        type: text
        value: Online Digital
      - name: estimatedChildren
        type: text
        value: "20"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

