info:
  name: Delete Account
  type: http
  seq: 6

http:
  method: DELETE
  url: "{{base_url}}/guardian/me"
  body:
    type: json
    data: |-
      {
        "password": "Passme"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{base_url}}/guardian/me"
      method: DELETE
      body:
        type: json
        data: |-
          {
            "password": "Passme"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
        - name: access-control-allow-origin
          value: "*"
        - name: date
          value: Tue, 29 Apr 2026 10:00:00 GMT
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
            "statusCode": 200,
            "message": "Your account is scheduled for deletion in 3 days. You can restore it any time before then.",
            "timestamp": "2026-04-29T10:00:00.000Z",
            "path": "/api/v1/guardian/me",
            "service": "RL4Kids",
            "version": "1.0.0",
            "data": {
              "scheduledDeletionDate": "2026-05-02T10:00:00.000Z"
            }
          }
  - name: Wrong password
    request:
      url: "{{base_url}}/guardian/me"
      method: DELETE
      body:
        type: json
        data: |-
          {
            "password": "wrongPassword"
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
        - name: access-control-allow-origin
          value: "*"
        - name: date
          value: Tue, 29 Apr 2026 10:00:00 GMT
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
            "statusCode": 401,
            "timestamp": "2026-04-29T10:00:00.000Z",
            "path": "/api/v1/guardian/me",
            "message": "Invalid password",
            "error": "UnauthorizedException",
            "service": "RL4Kids"
          }
