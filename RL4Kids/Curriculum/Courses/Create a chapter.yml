                              },
                              {
                                  "index": 3,
                                  "header": "Discovering Oceans: The Blue Heart of Our Planet",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "Oceans cover more than 70% of our planet and are like giant, blue worlds full of life beneath the waves. From colourful coral reefs to the deep, mysterious waters, the ocean is home to an incredible variety of creatures, from tiny plankton to the mighty blue whale. Oceans play a vital role in regulating the Earth’s climate and provide food and livelihoods for millions of people around the world.",
                                  "image": "",
                                  "template": "column",
                                  "headerFont": "Big"
                              },
                              {
                                  "index": 4,
                                  "header": "DIVE IN",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "Imagine diving into the ocean where you are surrounded by schools of brightly coloured fish, and you spot a sea turtle gliding gracefully by. The water is alive with movement, full of creatures big and small, each playing apart in the ocean’s complex and beautiful ecosystem.",
                                  "image": "https://recycled-learning-test.s3.eu-north-1.amazonaws.com/67cc66426ebf092e6728f7d4/image/858d07ee-e25d-4710-ba6c-a28efd88ffd1/TS1CH2_4.png",
                                  "template": "image-left",
                                  "headerFont": "Big"
                              }
                          ]
                      },
                      {
                          "index": 5,
                          "title": "",
                          "paragraphs": [
                              {
                                  "index": 1,
                                  "header": "Activity 2.3: Ocean Explorer",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "What to Do: Draw an ocean scene in your journal. Include different kinds of sea creatures, like fish, dolphins, sea turtles, and maybe even a whale. Think about how all these animals depend on the ocean to live and how they interact with each other in this underwater world.",
                                  "image": "",
                                  "template": "column",
                                  "headerFont": "Small"
                              },
                              {
                                  "index": 2,
                                  "header": "Discovering Grasslands: The Wide-Open Plains",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "Grasslands are vast, open spaces covered with grasses and wildflowers. These areas might not have many trees, but they are home to some of the most iconic animals on the planet. In Africa, grasslands are where you’ll find herds of zebras, gazelles, and the majestic lion. In North America, grasslands are home to bison, prairie dogs, and a variety of birds. The grasses provide food for these animals and play a crucial role in maintaining healthy soil.",
                                  "image": "",
                                  "template": "column",
                                  "headerFont": "Big"
                              },
                              {
                                  "index": 3,
                                  "header": "WONDER",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "Picture a grassland stretching as far as the eye can see, with herds of zebras grazing and lions resting in the shade. The grasses sway gently in the breeze, and the sky is wide and blue. This open, sun-filled space is a perfect home for many animals that have adapted to life in the grasslands.",
                                  "image": "https://recycled-learning-test.s3.eu-north-1.amazonaws.com/67cc66426ebf092e6728f7d4/image/8a870433-7ca8-4521-9d30-e58d972721c4/TS1CH2_5.png",
                                  "template": "image-left",
                                  "headerFont": "Big"
                              },
                              {
                                  "index": 4,
                                  "header": "Activity 2.4: Grassland Safari",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "What to Do: In your journal, draw a picture of a grassland. Which animals would you find there? Include tall grasses, wildflowers, and the animals that call this place home, such as zebras, lions, bison, or prairie dogs.",
                                  "image": "",
                                  "template": "image-left",
                                  "headerFont": "Small"
                              }
                          ]
                      },
                      {
                          "index": 6,
                          "title": "Eco Explorers Learning Corner",
                          "paragraphs": [
                              {
                                  "index": 1,
                                  "header": "1. Forest",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "",
                                  "image": "",
                                  "template": "column",
                                  "headerFont": "Small",
                                  "list": [
                                      {
                                          "title": "",
                                          "content": "A large area covered with trees, plants, and lots of different animals."
                                      },
                                      {
                                          "title": "",
                                          "content": "Forests are full of life and help clean the air we breathe. Think about how all the plants and animals work together to create a thriving ecosystem."
                                      }
                                  ]
                              },
                              {
                                  "index": 2,
                                  "header": "2. Desert",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "",
                                  "image": "",
                                  "template": "column",
                                  "headerFont": "Small",
                                  "list": [
                                      {
                                          "title": "",
                                          "content": "A dry, sandy place with very little water, but still home to many plants and animals that have special adaptations to survive."
                                      },
                                      {
                                          "title": "",
                                          "content": "Even in the harsh desert, life finds a way to survive. Consider how these plants and animals are specially adapted to their environment."
                                      }
                                  ]
                              },
                              {
                                  "index": 3,
                                  "header": "3. Ocean",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "",
                                  "image": "",
                                  "template": "column",
                                  "headerFont": "Small",
                                  "list": [
                                      {
                                          "title": "",
                                          "content": "A huge body of saltwater that covers most of our planet and is home to countless sea creatures."
                                      },
                                      {
                                          "title": "",
                                          "content": "Oceans are teeming with life and play a vital role in keeping our planet healthy by regulating climate and providing food."
                                      }
                                  ]
                              },
                              {
                                  "index": 2,
                                  "header": "4. Grassland",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "",
                                  "image": "",
                                  "template": "column",
                                  "headerFont": "Small",
                                  "list": [
                                      {
                                          "title": "",
                                          "content": "A wide, open area covered with grasses and wildflowers, home to many large animals."
                                      },
                                      {
                                          "title": "",
                                          "content": "Grasslands are essential for supporting a variety of animals and help maintain healthy soil."
                                      }
                                  ]
                              }
                          ]
                      }
                  ]
              }
          }
