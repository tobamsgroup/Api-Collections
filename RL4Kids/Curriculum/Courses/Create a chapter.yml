                  "pages": [
                      {
                          "index": 1,
                          "title": "",
                          "paragraphs": [
                              {
                                  "index": 1,
                                  "header": "Get Ready for an Epic Adventure!",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "Welcome back, Eco Explorers! Are you ready to journey to some of the most incredible places on our planet without even leaving your seat? In this chapter, we’re going to explore four very special environments: forests, deserts, oceans, and grasslands. Each of these places is unique, filled with fascinating plants, amazing animals, and hidden secrets just waiting to be discovered. We’ll learn what makes each one so special, how they work, and why they need our help to stay healthy and vibrant. So, grab your explorer hat, and let’s embark on this exciting adventure!",
                                  "image": "https://recycled-learning-test.s3.eu-north-1.amazonaws.com/67cc66426ebf092e6728f7d4/image/53a335bd-bf9c-408e-9699-ecf1af00b044/TS1CH2_1.png",
                                  "template": "column",
                                  "headerFont": "Big"
                              }
                          ]
                      },
                      {
                          "index": 2,
                          "title": "",
                          "paragraphs": [
                              {
                                  "index": 1,
                                  "header": "Discovering Forests: The Green Lungs of the Earth",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "Forests are often called the “lungs of the Earth” because they produce much of the oxygen we breathe. These green, leafy places are teeming with life—tall trees reaching for the sky, birds singing high in the branches, and animals of all sizes making their homes among the trees. Forests provide food, shelter, and clean air for countless species, including us!",
                                  "image": "",
                                  "template": "column",
                                  "headerFont": "Big"
                              },
                              {
                                  "index": 2,
                                  "header": "IMAGINE",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "Imagine walking through a thick forest where the trees are so tall they seem to touch the sky. You can hear the rustling of leaves under foot, the chirping of birds above, and maybe even spot a deer or squirrel darting through the trees. The air smells fresh and earthy because the trees are hard at work, cleaning the air and providing oxygen for all living things.",
                                  "image": "https://recycled-learning-test.s3.eu-north-1.amazonaws.com/67cc66426ebf092e6728f7d4/image/a6ef3cfe-ba04-4ec6-bbcd-8d32fc899cbc/TS1CH2_2.png",
                                  "template": "image-left",
                                  "headerFont": "Big"
                              },
                              {
                                  "index": 3,
                                  "header": "Activity 2.1: Forest Adventure",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "What to Do: In your Eco Explorer Journal, draw a picture or write about a vibrant forest. Include some of the animals that might live there, such as birds, deer, and squirrels. Don’t forget to add the tall trees and maybe even a river or stream running through it.",
                                  "image": "",
                                  "template": "column",
                                  "headerFont": "Small"
                              },
                              {
                                  "index": 4,
                                  "header": "Discovering Deserts: The Survival Experts",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "Deserts might look like empty, barren places, but they are actually full of life! These dry, sandy regions have very little water, but the plants and animals that live there are true survival experts. From cacti that store water in their thick stems to lizards that bask in the sun, deserts are home to some of the toughest creatures on Earth.",
                                  "image": "",
                                  "template": "column",
                                  "headerFont": "Big"
                              }
                          ]
                      },
                      {
                          "index": 3,
                          "title": "",
                          "paragraphs": [
                              {
                                  "index": 1,
                                  "header": "THINK",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "Think about how hot and dry the desert is. Despite these harsh conditions, plants like cacti manage to store precious water, and animals like camels and lizards can survive with very little. These adaptations help them live in a place where most other plants and animals would struggle.",
                                  "image": "https://recycled-learning-test.s3.eu-north-1.amazonaws.com/67cc66426ebf092e6728f7d4/image/fbe99fdc-3adc-4504-a908-197003f8900b/TS1CH2_3.png",
                                  "template": "image-left",
                                  "headerFont": "Big"
                              },
                              {
                                  "index": 2,
                                  "header": "Activity 2.2: Desert Survivor",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "What to Do: Draw a picture of a desert in your journal. Include some of the unique plants and animals that can survive there, like cacti, lizards, and camels. Think about what makes these plants and animals so special and how they are able to live in such a hot, dry place.",
                                  "image": "",
                                  "template": "column",
                                  "headerFont": "Small"
                              },
                              {
                                  "index": 3,
                                  "header": "Discovering Oceans: The Blue Heart of Our Planet",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "Oceans cover more than 70% of our planet and are like giant, blue worlds full of life beneath the waves. From colourful coral reefs to the deep, mysterious waters, the ocean is home to an incredible variety of creatures, from tiny plankton to the mighty blue whale. Oceans play a vital role in regulating the Earth’s climate and provide food and livelihoods for millions of people around the world.",
                                  "image": "",
                                  "template": "column",
                                  "headerFont": "Big"
                              },
                              {
                                  "index": 4,
                                  "header": "DIVE IN",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "Imagine diving into the ocean where you are surrounded by schools of brightly coloured fish, and you spot a sea turtle gliding gracefully by. The water is alive with movement, full of creatures big and small, each playing apart in the ocean’s complex and beautiful ecosystem.",
                                  "image": "",
                                  "template": "image-left",
                                  "headerFont": "Big"
                              }
                          ]
                      },
                      {
                          "index": 3,
                          "title": "",
                          "paragraphs": [
                              {
                                  "index": 1,
                                  "header": "THINK",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "Think about how hot and dry the desert is. Despite these harsh conditions, plants like cacti manage to store precious water, and animals like camels and lizards can survive with very little. These adaptations help them live in a place where most other plants and animals would struggle.",
                                  "image": "https://recycled-learning-test.s3.eu-north-1.amazonaws.com/67cc66426ebf092e6728f7d4/image/fbe99fdc-3adc-4504-a908-197003f8900b/TS1CH2_3.png",
                                  "template": "image-left",
                                  "headerFont": "Big"
                              },
                              {
                                  "index": 2,
                                  "header": "Activity 2.2: Desert Survivor",
                                  "subHeader": "",
                                  "subContent": "",
                                  "content": "What to Do: Draw a picture of a desert in your journal. Include some of the unique plants and animals that can survive there, like cacti, lizards, and camels. Think about what makes these plants and animals so special and how they are able to live in such a hot, dry place.",
                                  "image": "",
