info:
  name: Refresh expired access token
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/auth/refresh-token"
  body:
    type: json
    data: |-
      {
          "refreshToken": "{{refresh}}"
      }
  auth:
    type: bearer
    token: "{{"

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setEnvVar("access", res.getBody().data.accessToken);
        bru.setEnvVar("refresh", res.getBody().data.refreshToken);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{base_url}}/auth/refresh-token"
      method: POST
    response:
      statusText: "201"
