info:
  name: Guardian password reset (after OTP verification)
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/auth/reset-password"
  body:
    type: json
    data: |-
      {
          "resetToken": "$2b$10$ZTMH0LaORYONOYtQKkjhLuhVO1RfbulzjJcllld8JqOXpbkiZKN9.",
          "newPassword": "newPassme"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{base_url}}/auth/reset-password"
      method: POST
      body:
        type: json
        data: |-
          {
              "resetToken": "$2b$10$ZTMH0LaORYONOYtQKkjhLuhVO1RfbulzjJcllld8JqOXpbkiZKN9.",
              "newPassword": "newPassme"
          }
    response:
      statusText: "201"
      headers:
        - name: X-Powered-By
          value: Express
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Content-Length
          value: "177"
        - name: ETag
          value: W/"b1-dgK7xxRaOqaQ6BFKhzk44c5E8yo"
        - name: Date
          value: Fri, 02 May 2025 19:06:28 GMT
        - name: Connection
          value: keep-alive
        - name: Keep-Alive
          value: timeout=5
      body:
        type: json
        data: |-
          {
              "statusCode": 200,
              "message": "User password reset successfully",
              "timestamp": "2025-05-02T19:06:28.834Z",
              "path": "/api/v1/auth/reset-password",
              "service": "RL4Kids",
              "version": "1.0.0"
          }
  - name: Invalid reset token error
    request:
      url: "{{base_url}}/auth/reset-password"
      method: POST
