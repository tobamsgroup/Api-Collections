          value: application/json; charset=utf-8
        - name: Content-Length
          value: "189"
        - name: ETag
          value: W/"bd-uPKRTCiI3XBR8bmRtvXEsltUro4"
        - name: Date
          value: Fri, 02 May 2025 19:07:53 GMT
        - name: Connection
          value: keep-alive
