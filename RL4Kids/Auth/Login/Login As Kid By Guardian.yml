docs: |-
  # Login As Kid By Guardian

  ## Purpose
  This endpoint allows a guardian (parent or teacher) to log in as one of their associated kids to access the kid's account. This enables guardians to monitor progress, manage settings, or assist with activities on behalf of the child.

  ## Endpoint Details
  - **Method:** `POST`
  - **URL:** `{{base_url}}/auth/login-as-kid/{kidId}`

  ## Path Parameters
  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | `kidId` | string | Yes | The unique identifier of the kid account to log in as. This must be a kid associated with the authenticated guardian. |

  ## Authentication Requirements
  This endpoint requires guardian authentication. The request must include a valid guardian access token in the authorization header:
  - **Header:** `Authorization: Bearer {{access}}`
  - The `{{access}}` variable should contain a valid guardian access token obtained from the guardian login endpoint.

  ## Response Details
  **Success Response (201 Created):**

  Returns a comprehensive response containing:
  - **Status Information:** Status code, message, timestamp, path, service name, and version
  - **Kid Profile Data:**
    - `_id`: Kid's unique identifier
    - `username`: Kid's username
    - `name`: Kid's full name
    - `age`: Kid's age
    - `preferredLearningTopics`: Array of learning topics the kid is interested in
    - `role`: User role (always "kid")
    - `guardianId`: ID of the associated guardian
    - `picture`: Profile picture URL
    - `earnedBadges`: Array of badges earned by the kid
    - `mood`: Current mood status
    - `totalXp`: Total experience points earned
    - `createdAt`: Account creation timestamp
    - `updatedAt`: Last update timestamp
  - **Authentication Tokens:**
    - `accessToken`: New JWT access token for the kid's session
    - `refreshToken`: New JWT refresh token for session renewal
    - `expiresIn`: Token expiration time in milliseconds (86400000 ms = 24 hours)

  ## Example Use Case
  A parent wants to check their child's learning progress and help them with a challenging activity. The parent:
  1. Logs in with their guardian credentials to obtain an access token
  2. Calls this endpoint with their child's `kidId` in the URL path
  3. Receives the child's profile data and new authentication tokens
  4. Uses the returned access token to interact with the API as the child, viewing their progress, earned badges, and learning activities

  This feature is particularly useful for:
  - Parents monitoring their child's educational progress
  - Teachers accessing student accounts to provide assistance
  - Guardians managing multiple kids' accounts from a single login
