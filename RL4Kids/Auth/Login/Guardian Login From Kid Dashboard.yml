docs: |-
  # Guardian Login From Kid Dashboard

  ## Overview
  This endpoint authenticates a guardian user accessing the system from a kid's dashboard. It validates the guardian's credentials and returns authentication tokens along with guardian profile information.

  ## Authentication Requirements
  - **Type**: Password-based authentication
  - **Kid ID**: Required in the URL path (identifies which kid's dashboard the guardian is accessing from)

  ## Endpoint
  ```
  POST {{base_url}}/auth/login-guardian/{kidId}
  ```

  ## Request Body Parameters

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | `password` | string | Yes | The guardian's password for authentication |

  ### Example Request Body
  ```json
  {
    "password": "Passme"
  }
  ```

  ## Response Format

  ### Success Response (201 Created)
  Returns guardian authentication data including access and refresh tokens.

  **Response Structure:**
  ```json
  {
    "statusCode": 200,
    "message": "Guardian authenticated successfully",
    "timestamp": "2025-12-09T09:46:22.981Z",
    "path": "/api/v1/auth/login-guardian/{kidId}",
    "service": "RL4Kids",
    "version": "1.0.0",
    "data": {
      "_id": "string",
      "email": "string",
      "isVerified": boolean,
      "kidIds": ["string"],
      "role": "string",
      "picture": "string",
      "createdAt": "string",
      "updatedAt": "string",
      "accessToken": "string",
      "refreshToken": "string",
      "expiresIn": "string"
    }
  }
  ```

  ### Response Fields

  | Field | Type | Description |
  |-------|------|-------------|
  | `statusCode` | number | HTTP status code (200 for success) |
  | `message` | string | Success message |
  | `timestamp` | string | ISO 8601 timestamp of the response |
  | `path` | string | API endpoint path |
  | `service` | string | Service name (RL4Kids) |
  | `version` | string | API version |
  | `data._id` | string | Guardian's unique identifier |
  | `data.email` | string | Guardian's email address |
  | `data.isVerified` | boolean | Email verification status |
  | `data.kidIds` | array | Array of kid IDs associated with this guardian |
  | `data.role` | string | Guardian's role (e.g., "teacher") |
  | `data.picture` | string | URL to guardian's profile picture |
  | `data.accessToken` | string | JWT access token for API authentication |
  | `data.refreshToken` | string | JWT refresh token for obtaining new access tokens |
  | `data.expiresIn` | string | Token expiration time in milliseconds |

  ## Status Codes

  | Code | Description |
  |------|-------------|
  | 201 | Guardian authenticated successfully |
  | 400 | Bad request - Invalid password or missing parameters |
  | 401 | Unauthorized - Invalid credentials |
  | 404 | Kid ID not found or not associated with guardian |

  ## Usage Notes
  - The `kidId` in the URL path must be a valid kid ID associated with the authenticating guardian
  - The returned `accessToken` should be included in subsequent API requests using the `Authorization: Bearer {accessToken}` header
  - The `refreshToken` can be used to obtain a new access token when the current one expires
  - Token expiration is provided in milliseconds (default: 86400000ms = 24 hours)
  - The guardian must have the kid in their `kidIds` array to successfully authenticate from that kid's dashboard
