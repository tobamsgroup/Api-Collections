docs: |-
  # Child Login Endpoint

  ## Purpose

  This endpoint authenticates a child user on the RL4Kids platform and returns their profile information along with authentication tokens.

  ## Request Details

  **Method:** `POST`  
  **Endpoint:** `/auth/login/kid`  
  **URL:** `{{base_url}}/auth/login/kid`

  ## Request Body Parameters

  The request requires a JSON body with the following parameters:

  | Parameter | Type | Required | Description |
  | --- | --- | --- | --- |
  | `username` | string | Yes | The child's username |
  | `password` | string | Yes | The child's password |
  | `rememberMe` | boolean | Yes | Whether to remember the login session |

  ### Example Request Body

  ``` json
  {
    "username": "AbduBilal-olareign",
    "password": "Passme",
    "rememberMe": true
  }

   ```

  ## Response

  **Success Status Code:** `200` or `201`

  ### Response Data Structure

  The successful response includes:

  - **User Profile Information:**
      
      - `_id`: User's unique identifier
          
      - `username`: Child's username
          
      - `name`: Child's full name
          
      - `age`: Child's age
          
      - `role`: User role (kid)
          
      - `preferredLearningTopics`: Array of learning topics
          
      - `mood`: Current mood status
          
      - `guardianId`: Associated guardian's ID
          
      - `picture`: Profile picture URL
          
      - `totalXp`: Total experience points earned
          
      - `earnedBadges`: Array of badges earned
          
      - `createdAt`: Account creation timestamp
          
      - `updatedAt`: Last update timestamp
          
      - `lastLogin`: Last login timestamp
          
  - **Authentication Tokens:**
      
      - `accessToken`: JWT access token for API authentication
          
      - `refreshToken`: JWT refresh token for obtaining new access tokens
          
      - `expiresIn`: Token expiration time in milliseconds (2592000000 ms = 30 days)
          

  ### Example Response

  ``` json
  {
    "statusCode": 200,
    "message": "Child logged in successfully",
    "timestamp": "2025-12-09T09:37:42.592Z",
    "path": "/api/v1/auth/login/kid",
    "service": "RL4Kids",
    "version": "1.0.0",
    "data": {
      "_id": "68fa61bf5fa8660a37eaa6ee",
      "username": "abdubilal-olareign",
      "name": "abdulrasaq bilal",
      "age": 12,
      "role": "kid",
      "accessToken": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...",
      "refreshToken": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...",
      "expiresIn": "2592000000 milliseconds"
    }
  }

   ```

  ## Post-Response Script

  This request includes a post-response script that automatically extracts and saves the authentication tokens to environment variables:

  - `access`: Stores the `accessToken` from the response
      
  - `refresh`: Stores the `refreshToken` from the response
      

  These tokens are then available for use in subsequent API requests that require authentication.
