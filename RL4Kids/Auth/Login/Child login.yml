info:
  name: Child login
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/auth/login/kid"
  body:
    type: json
    data: |-
      {
          "username": "AbduBilal-olareign",
          "password": "Passme",
          "rememberMe": true
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setEnvVar("access", res.getBody().data.accessToken);
        bru.setEnvVar("refresh", res.getBody().data.refreshToken);

