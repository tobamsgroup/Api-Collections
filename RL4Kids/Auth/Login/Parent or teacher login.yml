info:
  name: Parent or teacher login
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/auth/login/guardian"
  body:
    type: json
    data: |-
      {
          //"email": "taofeeq.abdulrasaq@tobamsgroup.com",
          "email": "abdulrasaqolarewaju88@gmail.com",
          "password": "Passme",
          "rememberMe": false
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setEnvVar("access", res.getBody().data.accessToken);
        bru.setEnvVar("refresh", res.getBody().data.refreshToken);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

