docs: |-
  # Guardian/Parent/Teacher Login

  ## Overview
  This endpoint authenticates guardians, parents, or teachers in the RL4Kids system. Upon successful authentication, it returns access and refresh tokens along with the user's profile information.

  ## Authentication
  **No authentication required** - This is a public login endpoint.

  ## Request Body Parameters

  The request accepts a JSON payload with the following parameters:

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | `email` | string | Yes | The email address of the guardian/parent/teacher account |
  | `password` | string | Yes | The user's password |
  | `rememberMe` | boolean | No | If set to `true`, extends the session duration for persistent login. Defaults to `false` |

  ### Example Request Body
  ```json
  {
    "email": "user@example.com",
    "password": "YourPassword123",
    "rememberMe": false
  }
  ```

  ## Success Response

  **Status Code:** `201 Created`

  The response includes:
  - **User Details**: Complete user profile including `_id`, `email`, `role`, `kidIds`, verification status, and timestamps
  - **Access Token**: JWT token for authenticating subsequent API requests
  - **Refresh Token**: Token used to obtain new access tokens when they expire
  - **Expiration Time**: Token validity period in milliseconds (typically 86400000ms = 24 hours)

  ### Example Response
  ```json
  {
    "statusCode": 200,
    "message": "Guardian logged in successfully",
    "data": {
      "_id": "68fa60b45fa8660a37eaa6e1",
      "email": "user@example.com",
      "role": "teacher",
      "accessToken": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...",
      "refreshToken": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...",
      "expiresIn": "86400000 milliseconds"
    }
  }
  ```

  ## Automated Token Management

  ⚠️ **Important**: This request includes a post-response script that automatically saves the authentication tokens to environment variables:
  - `access` - Stores the access token
  - `refresh` - Stores the refresh token

  These tokens are automatically available for use in subsequent authenticated requests in the collection.

  ## Usage Notes

  1. **First-Time Setup**: Ensure the `base_url` variable is set in your active environment
  2. **Token Storage**: After successful login, tokens are automatically saved - no manual copying required
  3. **Role-Based Access**: The endpoint works for all guardian roles (parent, teacher, etc.)
  4. **Session Persistence**: Use `rememberMe: true` for longer session duration
  5. **Saved Examples**: Check the saved examples for different login scenarios and response variations
