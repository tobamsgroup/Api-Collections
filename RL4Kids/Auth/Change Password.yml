info:
  name: Change Password
  type: http
  seq: 8

http:
  method: POST
  url: "{{base_url}}/auth/update-password"
  body:
    type: json
    data: |-
      {
        "currentPassword": "OldPassme",
        "newPassword": "NewPassme"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{base_url}}/auth/update-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "currentPassword": "OldPassme",
            "newPassword": "NewPassme"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
        - name: access-control-allow-origin
          value: "*"
        - name: date
          value: Tue, 29 Apr 2026 10:00:00 GMT
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
            "statusCode": 200,
            "message": "Password updated successfully",
            "timestamp": "2026-04-29T10:00:00.000Z",
            "path": "/api/v1/auth/update-password",
            "service": "RL4Kids",
            "version": "1.0.0"
          }
  - name: Wrong current password
    request:
      url: "{{base_url}}/auth/update-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "currentPassword": "WrongPass",
            "newPassword": "NewPassme"
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
        - name: access-control-allow-origin
          value: "*"
        - name: date
          value: Tue, 29 Apr 2026 10:00:00 GMT
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
            "statusCode": 401,
            "timestamp": "2026-04-29T10:00:00.000Z",
            "path": "/api/v1/auth/update-password",
            "message": "Current password is incorrect",
            "error": "UnauthorizedException",
            "service": "RL4Kids"
          }
