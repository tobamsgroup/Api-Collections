info:
  name: Get All Blogs
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/blog?category=AI in Education"
  params:
    - name: category
      value: AI in Education
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
