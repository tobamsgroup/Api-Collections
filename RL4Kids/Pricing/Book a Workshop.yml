  url: "{{base_url}}/pricing/workshop-inquiry"
  body:
    type: json
    data: |-
      {
        "contactInfo": {
          "schoolName": "Sunrise International School",
          "country": "United Kingdom",
          "city": "London",
          "contactFullName": "James Hargreaves",
          "contactRole": "School Administrator",
          "emailAddress": "j.hargreaves@sunriseintl.co.uk",
          "phoneNumber": "+447700900123"
        },
        "details": {
          "workshopType": "teacher_workshop",
          "teacherPlanType": "classroom_delivery_workshop",
          "numberOfTeacherSeats": 12,
          "comments": "We'd like the workshop tailored to the Think Leadership curriculum."
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

