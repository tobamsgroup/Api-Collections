info:
  name: Add a kid unlocked badge
  type: http
  seq: 10

http:
  method: PATCH
  url: "{{base_url}}/kid/badges"
  body:
    type: json
    data: |-
      {
          "badgeName": "Quick Learner"
      }
  auth:
    type: bearer
    token: "{{access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

