info:
  name: Upload a single file
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/upload/single"
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value:
          - Bk6ZoyI-2/birthday badge.png
      - name: folder
        type: text
        value: badges
        description: RLK badges
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

