info:
  name: Get all files in a folder
  type: http
  seq: 6

http:
  method: GET
  url: "{{base_url}}/upload/files?folder=badges"
  params:
    - name: folder
      value: badges
      type: query
      description: The folder name enter when the file is uploaded
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{base_url}}/upload/files?folder=profile"
      method: GET
      params:
