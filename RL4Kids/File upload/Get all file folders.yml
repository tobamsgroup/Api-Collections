info:
  name: Get all file folders
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/upload/folders"
  body:
    type: text
    data: "{\r

      \  \"cover\": \"https://example.com/course-cover.jpg\",\r

      \  \"category\": \"Finance\",\r

      \  \"courseTitle\": \"Think Finance\",\r

      \  \"series\": [\r

      \    {\r

      \      \"bookCover\": \"https://example.com/book1-cover.jpg\",\r

      \      \"seriesNo\": 1,\r

      \      \"bookTitle\": \"Eco Heroes: The Beginning\",\r

      \      \"overview\": {\r

      \        \"title\": \"Introduction to Heroes\",\r

      \        \"description\": \"Learn the basics of sustainable living with our Eco Heroes.\"\r

      \      },\r

      \      \"bookContent\": \"Chapter 1: The Journey Begins...\",\r

      \      \"price\": 15.99\r

      \    },\r

      \    {\r

      \      \"bookCover\": \"https://example.com/book2-cover.jpg\",\r

      \      \"seriesNo\": 2,\r

      \      \"bookTitle\": \"Eco Heroes: Advanced Techniques\",\r

      \      \"overview\": {\r

      \        \"title\": \"Advanced Techniques\",\r

      \        \"description\": \"Take your sustainable living skills to the next level.\"\r

      \      },\r

      \      \"bookContent\": \"Chapter 2: Advanced Strategies...\",\r

      \      \"price\": 18.99\r

      \    }\r

      \  ],\r

      \  \"price\": 59.99\r

      }"
  auth:
    type: bearer
    token: "{{teacher_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

