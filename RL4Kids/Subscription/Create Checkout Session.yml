info:
  name: Create Checkout Session
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/subscription/checkout"
  body:
    type: json
    data: |-
      {
        "planId": "explorer"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{base_url}}/subscription/checkout"
      method: POST
      body:
        type: json
        data: |-
          {
            "planId": "explorer"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: content-type
          value: application/json; charset=utf-8
        - name: access-control-allow-origin
          value: "*"
        - name: date
          value: Tue, 29 Apr 2026 10:00:00 GMT
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
            "statusCode": 201,
            "message": "Checkout session created",
            "timestamp": "2026-04-29T10:00:00.000Z",
            "path": "/api/v1/subscription/checkout",
            "service": "RL4KIDS",
            "version": "1.0.0",
            "data": {
              "url": "https://checkout.stripe.com/pay/cs_test_abc123"
            }
          }
  - name: Invalid plan ID
    request:
      url: "{{base_url}}/subscription/checkout"
      method: POST
      body:
        type: json
        data: |-
          {
            "planId": "invalid_plan"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: content-type
          value: application/json; charset=utf-8
        - name: access-control-allow-origin
          value: "*"
        - name: date
          value: Tue, 29 Apr 2026 10:00:00 GMT
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
            "statusCode": 400,
            "timestamp": "2026-04-29T10:00:00.000Z",
            "path": "/api/v1/subscription/checkout",
            "message": ["planId must be a valid enum value"],
            "error": "Bad Request",
            "service": "RL4KIDS"
          }
