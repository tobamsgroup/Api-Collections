info:
  name: Reactivate Subscription
  type: http
  seq: 5

http:
  method: POST
  url: "{{base_url}}/subscription/me/reactivate"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{base_url}}/subscription/me/reactivate"
      method: POST
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
        - name: access-control-allow-origin
          value: "*"
        - name: date
          value: Tue, 29 Apr 2026 10:00:00 GMT
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
            "statusCode": 200,
            "message": "Subscription reactivated. Your plan will continue as normal.",
            "timestamp": "2026-04-29T10:00:00.000Z",
            "path": "/api/v1/subscription/me/reactivate",
            "service": "RL4KIDS",
            "version": "1.0.0"
          }
  - name: No active subscription to reactivate
    request:
      url: "{{base_url}}/subscription/me/reactivate"
      method: POST
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: content-type
          value: application/json; charset=utf-8
        - name: access-control-allow-origin
          value: "*"
        - name: date
          value: Tue, 29 Apr 2026 10:00:00 GMT
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
            "statusCode": 400,
            "timestamp": "2026-04-29T10:00:00.000Z",
            "path": "/api/v1/subscription/me/reactivate",
            "message": "No subscription scheduled for cancellation",
            "error": "Bad Request",
            "service": "RL4KIDS"
          }
