info:
  name: Cancel Subscription
  type: http
  seq: 4

http:
  method: DELETE
  url: "{{base_url}}/subscription/me"
  body:
    type: json
    data: |-
      {
        "reason": "The subscription is too expensive"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{base_url}}/subscription/me"
      method: DELETE
      body:
        type: json
        data: |-
          {
            "reason": "The subscription is too expensive"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
        - name: access-control-allow-origin
          value: "*"
        - name: date
          value: Tue, 29 Apr 2026 10:00:00 GMT
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
            "statusCode": 200,
            "message": "Subscription cancelled. You will retain access until the end of your billing period.",
            "timestamp": "2026-04-29T10:00:00.000Z",
            "path": "/api/v1/subscription/me",
            "service": "RL4KIDS",
            "version": "1.0.0",
            "data": {
              "currentPeriodEnd": "2026-05-29T10:00:00.000Z"
            }
          }
  - name: Success (no reason provided)
    request:
      url: "{{base_url}}/subscription/me"
      method: DELETE
      body:
        type: json
        data: |-
          {}
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
        - name: access-control-allow-origin
          value: "*"
        - name: date
          value: Tue, 29 Apr 2026 10:00:00 GMT
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
            "statusCode": 200,
            "message": "Subscription cancelled. You will retain access until the end of your billing period.",
            "timestamp": "2026-04-29T10:00:00.000Z",
            "path": "/api/v1/subscription/me",
            "service": "RL4KIDS",
            "version": "1.0.0",
            "data": {
              "currentPeriodEnd": "2026-05-29T10:00:00.000Z"
            }
          }
