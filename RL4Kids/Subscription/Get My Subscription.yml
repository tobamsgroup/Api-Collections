info:
  name: Get My Subscription
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/subscription/me"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{base_url}}/subscription/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
        - name: access-control-allow-origin
          value: "*"
        - name: date
          value: Tue, 29 Apr 2026 10:00:00 GMT
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
            "statusCode": 200,
            "message": "Subscription fetched",
            "timestamp": "2026-04-29T10:00:00.000Z",
            "path": "/api/v1/subscription/me",
            "service": "RL4KIDS",
            "version": "1.0.0",
            "data": {
              "plan": "explorer",
              "status": "active",
              "stripeCustomerId": "cus_abc123",
              "stripeSubscriptionId": "sub_abc123",
              "stripePriceId": "price_abc123",
              "currentPeriodEnd": "2026-05-29T10:00:00.000Z",
              "cancelAtPeriodEnd": false,
              "cancellationReason": null,
              "additionalKids": 0
            }
          }
  - name: Free plan (no Stripe data)
    request:
      url: "{{base_url}}/subscription/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
        - name: access-control-allow-origin
          value: "*"
        - name: date
          value: Tue, 29 Apr 2026 10:00:00 GMT
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
            "statusCode": 200,
            "message": "Subscription fetched",
            "timestamp": "2026-04-29T10:00:00.000Z",
            "path": "/api/v1/subscription/me",
            "service": "RL4KIDS",
            "version": "1.0.0",
            "data": {
              "plan": "free",
              "status": "active",
              "stripeCustomerId": null,
              "stripeSubscriptionId": null,
              "stripePriceId": null,
              "currentPeriodEnd": null,
              "cancelAtPeriodEnd": false,
              "cancellationReason": null,
              "additionalKids": 0
            }
          }
