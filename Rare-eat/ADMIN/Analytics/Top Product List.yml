info:
  name: Top Product List
  type: http
  seq: 5

http:
  method: GET
  url: "{{LIVE}}/admin/analytics/product?status=processing&month=3&year=2024"
  params:
    - name: status
      value: processing
      type: query
    - name: month
      value: "3"
      type: query
    - name: year
      value: "2024"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
