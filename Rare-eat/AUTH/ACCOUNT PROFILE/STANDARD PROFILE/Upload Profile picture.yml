info:
  name: Upload Profile picture
  type: http
  seq: 3

http:
  method: POST
  url: "{{URL}}/user/standard/profile/upload"
  body:
    type: multipart-form
    data:
      - name: image
        type: file
        value:
          - /C:/Users/HP/Desktop/L.jpeg
  auth:
    type: bearer
    token: "{{jwt}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
