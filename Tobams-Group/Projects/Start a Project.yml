info:
  name: Start a Project
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE}}/projects"
  body:
    type: json
    data: |-
      {
        "firstName": "Inemsit",
        "lastName": "Udousoro",
        "company": "Blackberry Inc",
        "country": "Wales",
        "email": "harry_p30@yahoo.com",
        "telephone": "+2347068687200",
        "projectStack": ["Tech Talent Solutions"],
        "description":"I need an app for my hospital"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

