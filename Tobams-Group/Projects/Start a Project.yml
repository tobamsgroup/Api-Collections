docs: This endpoint is for clients trying to request for TobamsGroup Innovative service. Upon successful request, a mail is sent to the `admin` email address from where a follow up can be carried out. A `success` response is returned when all `body` params are valid, a `Validation Error` is returned when one or more of the required fields are missing and a `Server Error` when there is a mismatch on the input requesTparams or something went wrong on the server. On the project stacks the request string must match the following type of service offered by Tobams `[`"Mobile App Development", "Website Design and Development", "Creative and Digital Media", 'Digital Marketing'`]`. It will throw a `Validation Error` if none is matching
