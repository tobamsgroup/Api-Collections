info:
  name: All Proposals
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE}}/projects/all?page=0&limit=10"
  params:
    - name: page
      value: "0"
      type: query
    - name: limit
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Page exceeded
    request:
      url: "{{@harek}}/projects/1"
      method: GET
    response:
      statusText: "206"
      headers:
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: Content-Security-Policy
          value: default-src 'none'; font-src 'self' http://localhost:8000/docs/; style-src 'self' 'unsafe-inline' http://localhost:8000/docs/; script-src 'self' 'unsafe-inline' http://localhost:8000/docs/; connect-src 'self' http://localhost:8000; img-src 'self' http://localhost:8000/docs/ data:;
        - name: Cross-Origin-Opener-Policy
          value: same-origin
        - name: Cross-Origin-Resource-Policy
          value: same-origin
        - name: Origin-Agent-Cluster
          value: ?1
        - name: Referrer-Policy
          value: no-referrer
        - name: Strict-Transport-Security
          value: max-age=15552000; includeSubDomains
