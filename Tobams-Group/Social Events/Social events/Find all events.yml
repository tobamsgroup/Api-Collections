info:
  name: Find all events
  type: http
  seq: 2

http:
  method: GET
  url: "{{DEV_BASE}}/social_events/?skip=1&limit=10"
  params:
    - name: skip
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
