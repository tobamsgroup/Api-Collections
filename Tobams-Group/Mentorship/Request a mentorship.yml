info:
  name: Request a mentorship
  type: http
  seq: 5

http:
  method: POST
  url: "{{BASE}}/mentorship/requests"
  body:
    type: json
    data: |-
      
      {
        "receiverId": "67b66148ad4271308086ad75",
        "content": {
          "name": "Sarah Johnson",
          "message": "My name is Sarah Johnson, and I’m an intern in product design at Creative Minds Studio. \nI’ve been following your work on the UX Redesign Project for BloomTech, and I deeply admire your approach to creating impactful and user-centered designs.\n\nI’m currently working on refining my skills in prototyping and building user flows for a project aimed at improving educational apps. I believe your guidance would be invaluable as I navigate these areas. Your expertise in designing seamless user experiences and leading innovative projects really resonates with the direction I want to grow in, and I would be honored to learn from you.\n\nIf you’re open to it, I’d love to discuss how we could structure a mentorship that aligns with your availability and expertise.\n\nThank you for considering my request. I look forward to hearing from you! 😊"
        },
        "mentorshipType": "One-to-One"
      }
  auth:
    type: bearer
    token: "{{mentor_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

