docs: With this endpoint, you can update an article record by parseing the ariticle `ObjectId` alongside the `body` params. Upon `success` request, a `202` response is returned. `Reference error` is returned when there is an invalid `ObjectId` and a `Not found` error is returned when the `ObjectId` is valid mongoose `ObjectId` but not tied to any doucument. `Server error` is returned when there is a mismatch on either the request body or from the server.
