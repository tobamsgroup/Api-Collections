info:
  name: View All
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE}}/blog/all?page=0&limit=10"
  params:
    - name: page
      value: "0"
      type: query
    - name: limit
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

