          value: Fri, 01 Mar 2024 11:11:27 GMT
        - name: Connection
          value: keep-alive
        - name: Keep-Alive
          value: timeout=5
      body:
        type: json
        data: |-
          {
              "success": false,
              "message": "An article should have a photo"
          }

docs: This endpoint is for creating or adding new testimonial on the database. A `success` response is returned when all `body` params are valid, a `Validation Error` is returned when one or more of the required fields are missing and a `Server Error` when there is a mismatch on the input request params or something went wrong on the server
