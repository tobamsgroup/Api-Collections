        - name: Keep-Alive
          value: timeout=5
      body:
        type: json
        data: |-
          {
              "success": false,
              "error": "Expected double-quoted property name in JSON at position 249"
          }
  - name: Validation error
    request:
      url: "{{@harek}}/blog"
      method: POST
      body:
        type: json
        data: |-
          {
            "title": "Resentful Mind",
            "category": "Mindfullness",
            "content": "<h1>Resilient mind</h1><br><p>This is the content of Resilient Mind</p>",
            "duration": "5 minutes read"
          }
