info:
  name: Create a course
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE}}/courses"
  body:
    type: json
    data: |-
      {
          "name": "Computer software development",
          "description": "Important development course",
          "category": "Career Development",
          "price": "100",
          "status": "status", // specific
          "imageUrl": "file",
          "courseUrl": "string"
      }
  auth:
    type: bearer
    token: "{{admin_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
