info:
  name: Get user's feedback by userId
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE}}/feedbacks/users?userId=67b65c0c2478ee6593c4983a&requestType=received&feedbackType=Mentorship"
  params:
    - name: userId
      value: 67b65c0c2478ee6593c4983a
      type: query
      description: Not neccessary if the request is for the current logged in user
    - name: requestType
      value: received
      type: query
      description: '"sent" or "received"'
    - name: feedbackType
      value: Mentorship
      type: query
      description: Type of feedback according to design or usage
  auth:
    type: bearer
    token: "{{mentor_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

