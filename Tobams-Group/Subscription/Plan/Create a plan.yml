info:
  name: Create a plan
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE}}/plans"
  body:
    type: json
    data: |-
      {
          "name": "Premium", // Free-trial, Basic, Standard, Premium
          "currency": "NGN", // GBP, NGN
          "monthlyPrice": 220000,
          "annualPrice": 2000000,
          "annualDiscount": "Save ₦640,000 (24%)", // Optional
          "features": {
              "jobListingsPerMonth": 1000,
              "internshipListings": true, // Default true
              "targetAudience": "Both", // Optional, default Interns, Interns, Talents, or Both
              "talentPooSearch": true, // Default false
              "filteringTools": "AI-Powered", // None, Basic, Standard, AI-Powered
              "featuredJobPromotions": 5,
              "inAppMessaging": true, // Default false
              "analyticsLevel": "Full + Export", // None, Standard, Advanced, Full + Export
              "teamMembersAllowed": 15, // Min 1
              "priorityListing": true, // Default false
              "customerSupport": "Dedicated" // Community, Email,  Priority Email, Dedicated
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

