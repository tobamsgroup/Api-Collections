info:
  name: Create an add-on
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE}}/add-ons"
  body:
    type: json
    data: |-
      {
          "name": "AI Filtering Boost",
          // "description": "", // default to ''
          // "quantity": 1, // default to 1
          "billingUnit": "month", // post, month, feature, user (default to null)
          "currency": "NGN",
          "price": 10000
          // "isActive": true // default to true

      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

