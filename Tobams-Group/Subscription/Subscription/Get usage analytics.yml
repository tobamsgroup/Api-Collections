info:
  name: Get usage analytics
  type: http
  seq: 6

http:
  method: GET
  url: "{{BASE}}/subscriptions/analytics"
  body:
    type: json
    data: |-
      {
          "period": "weekly" // 'daily' | 'weekly' | 'monthly'
      }
  auth:
    type: bearer
    token: "{{org_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

