info:
  name: Get all active subscriptions
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE}}/subscriptions/admin/active"
  body:
    type: text
    data: |-
      {
          "period": "weekly" // 'daily' | 'weekly' | 'monthly'
      }
  auth:
    type: bearer
    token: "{{org_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
