  params:
    - name: paymentProvider
      value: paystack
      type: query
      description: paystack or stripe
    - name: purpose
      value: addOns only
      type: query
  body:
    type: json
    data: "{\r

      \    // \"planId\": \"68885ef0fc5e5f12ac1ce94c\",// \"68886050fc5e5f12ac1ce94f\", // \"688783b694a57ed0100af0ea\", // 688783b694a57ed0100af0ea 688772e850412d1e84333088 68885ef0fc5e5f12ac1ce94c\r

