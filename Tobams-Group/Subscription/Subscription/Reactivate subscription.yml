  type: http
  seq: 5

http:
  method: PATCH
  url: "{{BASE}}/subscriptions/reactivate"
  body:
    type: text
    data: |-
      {
          "cancelAtPeriodEnd": true // default to true
      }
  auth:
    type: bearer
    token: "{{org_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

