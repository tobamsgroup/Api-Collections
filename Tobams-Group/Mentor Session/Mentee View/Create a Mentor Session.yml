info:
  name: Create a Mentor Session
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE}}/mentor_session/"
  body:
    type: json
    data: "{\r

      \  \"agenda\": \"Session with Ericsson Doe\",\r

      \  \"mentorId\": \"67b66148ad4271308086ad89\",\r

      \  \"date\": \"2022-10-15T10:00:00Z\",\r

      \  \"time\": \"9:00 a.m\",\r

      \  \"notes\": [\"Discuss project progress\", \"Feedback on performance\"]\r

      }"
  auth:
    type: bearer
    token: "{{intern_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

