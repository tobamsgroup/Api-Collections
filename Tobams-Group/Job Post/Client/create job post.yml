info:
  name: create job post
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE}}/job_client/job-post"
  body:
    type: json
    data: "{\r

      \    \"companyName\": \"Tobams Group Affliates\",\r

      \    \"title\": \"Business Development & Marketing Manager\",\r

      \    \"jobDescription\": \"Tobams Group is a leading consultancy focused on transforming training, development, and education in entrepreneurship, career, and talent development. Our flagship initiative, Recycled Learning, is an innovative learning management system (LMS) for kids, incorporating books, digital platforms, and AI-driven learning solutions. We are actively engaging community governments, schools, universities, and corporations to adopt Recycled Learning as a sustainable education solution. Our mission is to bridge educational gaps, enhance learning experiences, and create opportunities for young learners through a technology-driven approach.\",\r

      \    \"contractType\": \"Full-time\", // Full-time, Part-time, Contract, Internship\r

      \    // \"location\": \"Remote & On-Site (Nigeria, UK, and Global Partnerships)\",\r

      \    \"jobType\": \"Remote\", // On-site, Hybrid, Remote\r

      \    \"location\": \"Lagos\",\r

      \    \"region\": [\r

      \        \"Africa\"\r

      \    ],\r

      \    \"jobData\": [\r

      \      {\r

      \        \"Position Overview\":[\r

      \            \"We are seeking a highly experienced and results-driven Business Development & Marketing Manager to spearhead the business expansion and client engagement efforts for Recycled Learning and other Tobams Group products. This is a high-profile role, requiring an individual with a strong sales, business development, and marketing background, with a proven track record of securing large-scale deals and partnerships. This role is primarily commission-based, with a competitive basic salary and an attractive 10% commission on every business deal closed. The ideal candidate must have the ability to strategically position the product, build lasting relationships, and drive high-value partnerships with government agencies, educational institutions, corporations, and private sector organization.\"\r

      \            ]\r

      \      },\r

      \      {\r

      \        \"Key Responsibilities:\":[]\r

      \      },\r

      \      {\r

      \        \"Business Development & Client Acquisition\": [\r

      \          \"Develop and execute a comprehensive business development strategy to attract and onboard community governments, schools, universities, and corporations.\",\r

      \          \"Identify, engage, and negotiate partnerships with decision-makers, procurement officers, and key stakeholders in education and training sectors\",\r

      \          \"Proactively research and identify new market opportunities, including tendering for government contracts and corporate learning programs.\",\r

      \          \"Generate leads, conduct pitches, and close high-value deals for the implementation of Recycled Learning solutions.\"\r

      \          ]\r

      \        },\r

      \      {\r

      \        \"Marketing & Brand Growth\": [\r

      \          \"Develop and implement a marketing strategy to increase brand awareness and market penetration.\",\r

      \          \"Lead the creation of marketing materials, digital campaigns, and promotional content that effectively communicate the value of Recycled Learning.\",\r

      \          \"Organize and represent the company at industry conferences, exhibitions, and networking events to increase visibility and partnership opportunities.\",\r

      \          \"Collaborate with the internal content development team to align product messaging with customer needs.\"\r

      \          ]\r

      \    },\r

      \      {\r

      \        \"Sales Strategy & Revenue Growth\": [\r

      \          \"Drive sales efforts through effective negotiation, pricing strategies, and closing tactics.\",\r

      \          \"Develop and maintain a strong sales pipeline, ensuring a consistent flow of new business opportunities.\",\r

      \          \"Work closely with the finance and leadership teams to create customized pricing models for different client segments.\",\r

      \          \"Consistently achieve and exceed sales targets, ensuring a strong revenue stream\"\r

      \          ]\r

      \    },\r

      \      {\r

      \        \"Stakeholder Engagement & Relationship Management\": [\r

      \          \"Build and maintain long-term relationships with key government officials, school administrators, university deans, corporate executives, and learning & development managers.\",\r

      \          \"Work closely with partners and investors to explore co-funding and sponsorship opportunities.\",\r

      \          \"Establish strategic alliances with international organizations for global expansion.\"\r

      \          ]\r

      \    },\r

      \      {\r

      \        \"Performance Tracking & Reporting\": [\r

      \          \"Develop key performance indicators (KPIs) to measure and track business development success.\",\r

      \          \"Prepare and present detailed reports on sales, revenue, client acquisition, and market trends to leadership.\",\r

      \          \"Continuously analyze competitor strategies and market trends to refine business development approaches.\"\r

      \          ]\r

      \    },\r

      \      {\r

      \        \"Key Qualifications & Experience\": [\r

      \          \"Minimum 7-10 years of experience in business development, sales, or marketing, preferably in the education, edtech, or training sectors.\",\r

      \          \"Proven track record of closing large-scale deals and building high-value partnerships.\",\r

      \          \"Extensive experience engaging with government bodies, educational institutions, and corporate organizations.\",\r

      \          \"Strong negotiation, communication, and presentation skills.\",\r

      \          \"Experience in developing and executing marketing campaigns and brand strategies.\",\r

      \          \"Ability to work independently with a **strong entrepreneurial mindset.\",\r

      \          \"Understanding of learning management systems (LMS), AI-driven education, and sustainability education is a plus.\"\r

      \          ]\r

      \    },\r

      \    {\r

      \        \"Compensation & Benefits\": [\r

      \          \"Basic Salary: Competitive\",\r

      \          \"Commission: 10% of every business deal closed.\",\r

      \          \"Flexible working arrangement (remote & on-site as needed).\",\r

      \          \"High earning potential based on performance.\",\r

      \          \"Opportunity to work with a pioneering team in sustainability and AI-driven education.\"\r

      \          ]\r

      \    },\r

      \    {\r

      \        \"How To Apply\": [\r

      \          \"Interested candidates should submit their CV and a cover letter detailing their relevant experience and achievements in business development.\",\r

      \          \"Applications should be sent to theteam@tobamsgroup.com with the subject “Business Development & Marketing Manager – Tobams Group\"\r

      \          ]\r

      \    }\r

      \    ],\r

      \    \"extraText\":\"Join Us & Make an Impact! This is a rare opportunity to be at the forefront of educational innovation and sustainability-driven learning. If you are an ambitious, target-driven professional looking for high earning potential and the chance to drive real change in education, we would love to hear from you!\",\r

      \    \"currencySymbol\": \"N\",\r

      \    \"salaryMinRange\": 200000,\r

      \    \"salaryMaxRange\": 500000,\r

      \    \"visibility\": \"Interns\" // All, Talents, Interns. Default to Interns\r

      }\r\n"
  auth:
    type: bearer
    token: "{{org_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

