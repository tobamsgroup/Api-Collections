info:
  name: all client jobs with pagination
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE}}/job_client?/page=1&limit=10"
  params:
    - name: /page
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
  auth:
    type: bearer
    token: "{{client_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
