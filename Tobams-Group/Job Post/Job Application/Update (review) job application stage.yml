info:
  name: Update (review) job application stage
  type: http
  seq: 6

http:
  method: PATCH
  url: "{{BASE}}/job-apply/stages/67d95f590b44aad1ccf50a4e"
  body:
    type: json
    data: |-
      {
          "postId": "67d95578b3ea8eee43ef5ce4",
          "stage": "Rejected"  // Applied | Shortlisted | Interviewed | Rejected | Reviewed | Hired
      }
  auth:
    type: bearer
    token: "{{client_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

