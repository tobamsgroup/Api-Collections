info:
  name: Get all posted jobs
  type: http
  seq: 10

http:
  method: GET
  url: "{{BASE}}/job_in_house/all?page=1&limit=12"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "12"
      type: query
  auth:
    type: bearer
    token: "{{admin_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
