info:
  name: create job post
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE}}/job_in_house/job-post"
  body:
    type: json
    data: "{\r

      \    \"companyName\": \"Tobams Group\",\r

      \    \"title\": \"Associate Social Media Manager\",\r

      \    \"jobDescription\": \"We are seeking a creative, strategic, and proactive Associate Social Media Manager to join our dynamic team. In this role, you will manage our digital presence across multiple platforms, craft engaging multimedia content, and help shape the brand's storytelling voice. You will collaborate closely with internal teams to execute impactful campaigns that drive engagement, strengthen brand identity, and expand our global audience. This is a fully remote role suited for a self-motivated professional who thrives in a fast-paced, creative, and collaborative environment.\",\r

      \    \"contractType\": \"Full-time\",\r

      \    \"location\": \"Remote\",\r

      \    \"region\": [\r

      \        \"Africa\"\r

      \    ],\r

      \    \"jobData\": [\r

      \      {\r

      \        \"Key Responsibilities\": [\r

      \            \"Develop, plan, and manage compelling content across all social platforms — including Instagram, LinkedIn, TikTok, YouTube, and X (Twitter).\",\r

      \            \"Create, edit, and produce high-quality multimedia content (short-form videos, graphics, and reels).\",\r

      \            \"Use tools such as Adobe Premiere Pro, CapCut, Canva, and AI-powered editing tools.\",\r

      \            \"Foster authentic online relationships and respond to comments, messages, and conversations that align with the brand's tone and values.\",\r

      \            \"Identify emerging social media trends and monitor competitors.\",\r

      \            \"Translate insights into actionable growth strategies.\",\r

      \            \"Track, analyze, and report on key performance metrics to evaluate content effectiveness and engagement.\",\r

      \            \"Work closely with the Marketing, Design, and Product teams to ensure social content aligns with broader campaign goals and organizational strategy.\",\r

      \            \"Bring the brand's vision to life through thoughtful storytelling and apply visual creativity while maintaining a consistent voice across all digital touchpoints.\"\r

      \        ]\r

      \      }, \r

      \      {\r

      \        \"Required Qualifications\": [\r

      \          \"1–3 years of hands-on experience in social media management, content creation, or digital marketing.\",\r

      \          \"Proficiency in video editing (Premiere Pro, CapCut).\",\r

      \          \"Proficiency in graphic design (Canva, Adobe Creative Suite).\",\r

      \          \"Familiarity with AI-based tools for content optimization.\",\r

      \          \"A strong eye for aesthetics, storytelling, and audience engagement.\",\r

      \          \"Exceptional written and verbal communication skills.\",\r

      \          \"Ability to manage multiple projects simultaneously and meet deadlines in a remote work environment.\",\r

      \          \"Independent, innovative, and results-driven mindset.\",\r

      \          \"Passion for staying ahead of digital and creative trends.\"\r

      \        ]\r

      \      },\r

      \    //   {\r

      \    //     \"Nice-to-Have Skills\": [\r

      \    //         \"Experience with social media analytics tools and platforms.\",\r

      \    //         \"Knowledge of paid social media advertising campaigns.\",\r

      \    //         \"Understanding of SEO and content marketing principles.\",\r

      \    //         \"Experience working with cross-functional teams in a remote environment.\",\r

      \    //         \"Portfolio showcasing previous social media campaigns and content creation work.\"\r

      \    //     ]\r

      \    //   },\r

      \      {\r

      \        \"What We Offer\": [\r

      \          \"A collaborative, global, and innovation-driven team environment.\",\r

      \          \"Opportunities for growth, learning, and creative experimentation.\",\r

      \          \"Flexible remote working arrangements.\",\r

      \          \"The chance to shape and elevate a fast-growing digital brand.\",\r

      \          \"Professional development opportunities in digital marketing and content strategy.\"\r

      \        ]\r

      \      }\r

      \    ],\r

      \    \"extraText\": \"Reports To: Lead Social Media Manager\",\r

      \    \"currencySymbol\": \"N\",\r

      \    \"salaryMinRange\": null,\r

      \    \"salaryMaxRange\": null\r

      }"
  auth:
    type: bearer
    token: "{{admin_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

