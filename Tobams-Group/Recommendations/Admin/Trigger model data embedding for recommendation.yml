info:
  name: Trigger model data embedding for recommendation
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE}}/recommendations/trigger?page=1&limit=3&model=Job"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "3"
      type: query
    - name: model
      value: Job
      type: query
  auth:
    type: bearer
    token: "{{admin_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
