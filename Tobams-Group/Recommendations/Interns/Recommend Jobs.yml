                      "title": "Chief Technology Officer - CTO",
                      "location": "Remote",
                      "isApplied": false,
                      "companyName": "Tobams Group",
                      "jobDescription": "Tobams Group is a global innovation and talent-development company dedicated to transforming how people learn, grow, and connect through AI-driven education, sustainability, and digital empowerment. The CTO will serve as the architect and innovation leader for all Tobams Group's technology initiatives. This role demands a bold, forward-thinking leader who can translate the company's ambitious vision into scalable, world-class digital solutions. You will drive AI strategy, technology architecture, platform scalability, and innovation culture across multiple business units - including Recycled Learning, Rare Eat, and other global projects. The ideal candidate will combine deep technical expertise with strategic leadership, a passion for AI in education, and the ability to build and manage high-performing global teams.",
                      "contractType": "Full-time",
                      "region": [
                          "Africa"
                      ],
                      "jobData": [
                          {
                              "Technology Vision & Leadership": [
                                  "Define and execute Tobams Group's overall technology roadmap across AI, EdTech, sustainability, and data-driven learning ecosystems.",
                                  "Build the long-term technology strategy that aligns with the company's mission to democratize access to quality learning globally.",
                                  "Serve as the principal advisor to the CEO and executive team on emerging technologies, AI ethics, scalability, and innovation priorities.",
                                  "Foster a culture of innovation, experimentation, and excellence within the technology and product teams."
                              ]
                          },
                          {
                              "Product & Platform Development": [
                                  "Oversee the architecture, design, and deployment of AI-powered platforms, including Recycled Learning adaptive learning system, Recycled Learning for Kids (AI-augmented learning platform), Tobams Group dashboards and analytics tools, and Global Teacher Learning Management System (LMS).",
                                  "Ensure all systems are scalable, secure, and data-driven, supporting millions of users globally.",
                                  "Lead the integration of personalized learning algorithms, gamified experiences, and adaptive assessment engines.",
                                  "Collaborate with Product Design & Learning Experience teams to create intuitive user interfaces and immersive learning journeys."
                              ]
                          },
                          {
                              "AI, Data, and Automation": [
                                  "Drive the company's AI strategy, including the use of machine learning, NLP, computer vision, and predictive analytics in learning and talent assessment.",
                                  "Oversee the development of AI recommendation systems for content, mentorship, and skills-based learning.",
                                  "Lead the design of data governance frameworks, learning analytics dashboards, and AI model evaluation systems.",
                                  "Explore partnerships with leading AI and cloud technology providers to accelerate innovation."
                              ]
                          },
                          {
                              "Technical Architecture & Infrastructure": [
                                  "Build and maintain a robust, modular, and scalable infrastructure to support multi-tenant LMS and platform solutions.",
                                  "Champion cloud-native architecture using AWS, GCP, or Azure with CI/CD pipelines and containerized deployments (Docker/Kubernetes).",
