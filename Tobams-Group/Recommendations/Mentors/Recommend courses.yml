info:
  name: Recommend courses
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE}}/recommendations/?type=courses"
  params:
    - name: type
      value: courses
      type: query
  auth:
    type: bearer
    token: "{{mentor_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
