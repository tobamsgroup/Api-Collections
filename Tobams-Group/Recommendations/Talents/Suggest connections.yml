info:
  name: Suggest connections
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE}}/recommendations?type=connection"
  params:
    - name: type
      value: connection
      type: query
  auth:
    type: bearer
    token: "{{talent_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
