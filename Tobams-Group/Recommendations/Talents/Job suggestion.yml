info:
  name: Job suggestion
  type: http
  seq: 4

http:
  method: GET
  url: "{{BASE}}/recommendations/?type=job"
  params:
    - name: type
      value: job
      type: query
  auth:
    type: bearer
    token: "{{talent_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
