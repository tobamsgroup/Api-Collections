info:
  name: Update Testimonial
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{BASE}}/testimonials/66058b7c4e785e4926d3f781"
  body:
    type: json
    data: |-
      {
          "Author": {
              "fullName": "James Hamilton",
              "role": "Product Manager",
              "company": "Resingal Corps",
              "photo": "https://res.cloudinary.com/dddiqpeib/image/upload/v1711639753/Testimonials/kjrkckdey6vqka3eecxu.jpg"
          },
          "Media": {
              "photo": "n/a",
              "video": "n/a"
          },
          "_id": "66058b7c4e785e4926d3f781",
          "comment": "Tobams Group engineers are just so amazing, they keep to their timings"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

