docs: With this endpoint, you can delete a testimonial record by parsing the testimonial `ObjectId` alongside the `body` params. Upon `success` deletion, a `204` response is returned. `Reference error` is returned when there is an invalid `ObjectId` and a `Not found` error is returned when the `ObjectId` is valid mongoose `ObjectId` but not tied to any doucument.
