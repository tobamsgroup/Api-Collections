info:
  name: Add Testimonials
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE}}/testimonials"
  body:
    type: json
    data: |-
      {
          "Author": {
              "fullName": "Arekhandia Harry",
              "role": "Software Engineer",
              "company": "Potter Incorporated",
              "photo": "https://res.cloudinary.com/dddiqpeib/image/upload/v1711639753/Testimonials/kjrkckdey6vqka3eecxu.jpg"
          },
          "comment": "I invented C++ programming language. Call me the Error Expert"
      }
  auth: inherit

settings:
