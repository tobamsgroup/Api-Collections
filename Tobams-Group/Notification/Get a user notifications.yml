      value: ""
      type: query
      description: default 1
    - name: limit
      value: ""
      type: query
      description: default 10
    - name: category
      value: ""
      type: query
      description: '"Internship", "Mentorship", "Job", "Course", "Event", "Chat", "Connection"'
    - name: status
      value: ""
      type: query
      description: '"read" or "unread"'
  auth:
    type: bearer
    token: "{{talent_access}}"

