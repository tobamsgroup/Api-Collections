info:
  name: Update user preference
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{BASE}}/notifications/settings"
  body:
    type: json
    data: |-
      {
        "newJobApplications": {
          "inApp": false,
          "email": true
        },
        "applicationUpdates": {
          "inApp": true,
          "email": true
        },
        "messageAlerts": {
          "inApp": true,
          "email": false
        },
        "platformAnnouncements": {
          "inApp": true,
          "email": true
        },
        "eventInvitations": {
          "inApp": false,
          "email": true
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

