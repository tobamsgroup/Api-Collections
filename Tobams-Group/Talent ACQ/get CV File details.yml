docs: |-
  This endpoint is for all file uploads across the Tobams web application. It takes it's file as a `formData` and uploads to the CDN and responds with the uploaded file information as an object. The `secure_url` is the `url` where the file can be accessed on the cloud. This url is what the client has to parse to the server as a `String` after the file has been successfully uploaded on the cloud.

  N/B: Take not of the `params` you must set a `directory` as a `query` `params` just to keep things a little bit clean up there at the CDN server.
