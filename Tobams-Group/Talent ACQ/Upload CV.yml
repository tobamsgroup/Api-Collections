info:
  name: Upload CV
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE}}/upload/cv"
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value:
          - /C:/Users/HP/Downloads/User-Centered_Design.pdf
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Upload CV
    request:
      url: "{{BASE}}/upload/cv"
      method: POST
      body:
        type: multipart-form
        data:
          - name: file
            type: file
            value:
              - /C:/Users/HP/Downloads/1610534843Unit 3 Strategic Planning.pdf
    response:
      statusText: "201"
      headers:
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: Content-Security-Policy
          value: default-src 'none'; font-src 'self' http://localhost:8000/docs/; style-src 'self' 'unsafe-inline' http://localhost:8000/docs/; script-src 'self' 'unsafe-inline' http://localhost:8000/docs/; connect-src 'self' http://localhost:8000; img-src 'self' http://localhost:8000/docs/ data:;
        - name: Cross-Origin-Opener-Policy
          value: same-origin
        - name: Cross-Origin-Resource-Policy
          value: same-origin
        - name: Origin-Agent-Cluster
          value: ?1
        - name: Referrer-Policy
          value: no-referrer
        - name: Strict-Transport-Security
