info:
  name: Create discount
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE}}/discounts/create"
  body:
    type: json
    data: |-
      {
          "uid": "development",  // user uid (uuid)
          "code": "SAVE01TG",
          "organization": "Tobams Group",
          "purposes": ["assessment"], // assessment, subscription, training
          "type": "percentage",
          "value": 100,
          "maxRedemptions": 10000, // Optional
          "expiresAt": "2030-07-01", // Optional
          "isActive": true // Optional
      }
  auth:
    type: bearer
    token: "{{admin_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

