  type: http
  seq: 3

http:
  method: PATCH
  url: "{{BASE}}/discounts?resetPurpose=false"
  params:
    - name: resetPurpose
      value: "false"
      type: query
  body:
    type: json
    data: |-
      {
          "uid": "development",  // user uid (uuid) required
          // "code": "SAVE20TG",
          "organization": "Tobams Group",
          "purposes": ["subscription", "assessment"],
          // "type": "percentage",
          // "value": 100,
          // "maxRedemptions": 10000, 
          // "expiresAt": "2030-07-01", 
          "isActive": true 

      }
  auth:
    type: bearer
    token: "{{admin_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

