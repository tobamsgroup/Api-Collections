info:
  name: Delete discount by uid
  type: http
  seq: 5

http:
  method: DELETE
  url: "{{BASE}}/discounts/uid/:uid"
  params:
    - name: uid
      value: development
      type: path
  auth:
    type: bearer
    token: "{{admin_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
