info:
  name: Onboard a member of an organisation
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE}}/auth/sign-up"
  body:
    type: json
    data: "{\r

      \  // BaseUser Fields (Required unless specified)\r

      \    \"telephone\": \"+1234567890\", // Required, must be E.164 format\r

      \    \"email\": \"company.admin@example.com\", // Required, valid email\r

      \    \"location\": {\r

      \      \"country\": \"United States\"\r

      \    },\r

      \    \"firstName\": \"John\", // Required\r

      \    \"lastName\": \"Doe\", // Optional\r

      \    \"occupation\": \"CEO\", // Optional\r

      \    \"role\": \"Corporate\" // Required, Enum Options: Admin, Talent, Mentor, Organisation, Corporate, Intern,\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: create
    request:
      url: "{{URL}}/client/sign-up"
      method: POST
      body:
        type: json
        data: "{\r

          \    \"companyName\": \"Truth Farm\",\r

          \    \"companySize\": \"10-49\",\r

          \    \"email\": \"ename4@gmail.com\",\r

          \    \"industry\": \"Energy\",\r

          \    \"password\": \"123456\",\r

          \    \"role\": \"Client\",\r

          \    \"telephone\": \"+2347044444561\",\r

          \    \"website\": \"https://www.truthFarm.com\",\r

          \    \"type\": \"emailOtp\"\r

          }"
    response:
      statusText: "201"
      headers:
        - name: Vary
          value: Origin
        - name: Content-Security-Policy
          value: default-src 'none'; font-src 'self' http://localhost:8000/docs/; style-src 'self' 'unsafe-inline' http://localhost:8000/docs/; script-src 'self' 'unsafe-inline' http://localhost:8000/docs/; connect-src 'self' http://localhost:8000; img-src 'self' http://localhost:8000/docs/ data:;
        - name: Cross-Origin-Opener-Policy
          value: same-origin
        - name: Cross-Origin-Resource-Policy
          value: same-origin
        - name: Origin-Agent-Cluster
          value: ?1
        - name: Referrer-Policy
          value: no-referrer
        - name: Strict-Transport-Security
          value: max-age=15552000; includeSubDomains
        - name: X-Content-Type-Options
          value: nosniff
        - name: X-DNS-Prefetch-Control
          value: off
        - name: X-Download-Options
          value: noopen
        - name: X-Frame-Options
          value: SAMEORIGIN
        - name: X-Permitted-Cross-Domain-Policies
          value: none
        - name: X-XSS-Protection
          value: "0"
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Content-Length
          value: "517"
        - name: ETag
          value: W/"205-vTub+yRh8ejiHBGLMqEN/7kfzw4"
        - name: Date
          value: Tue, 30 Jul 2024 07:40:50 GMT
        - name: Connection
          value: keep-alive
        - name: Keep-Alive
          value: timeout=5
      body:
        type: json
        data: |-
          {
              "message": "Client created",
              "data": {
                  "Contact": {
