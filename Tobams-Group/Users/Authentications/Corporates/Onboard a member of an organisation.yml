docs: |-
  `IndustryTypes { "Technology", "Healthcare", "Finance", "Manufacturing", "Retail", "Energy", "Transportation and Logistics", "Real Estate", "Hospitality and Tourism", "Entertainment and Media",}`

  CompanySizeTypes {

  ZERO_TO_NINE = "0-9", //Micro-Enterprise

  TEN_TO_FORTY_NINE = "10-49", //Small Business

  FIFTY_TO_ONE_HUNDRED_NINETY_NINE = "50-249", //Medium-Sized Business

  TWO_HUNDRED_TO_FIVE_HUNDRED_NINETY_NINE = "250-999", //Large Enterprise

  ABOVE_ONE_THOUSAND = "1000 and above", //Very Large Enterprise

  }
