examples:
  - name: create
    request:
      url: "{{URL}}/client/sign-up"
      method: POST
      body:
        type: json
        data: "{\r

          \    \"companyName\": \"Truth Farm\",\r

          \    \"companySize\": \"10-49\",\r

          \    \"email\": \"ename4@gmail.com\",\r

          \    \"industry\": \"Energy\",\r

          \    \"password\": \"123456\",\r

          \    \"role\": \"Client\",\r

          \    \"telephone\": \"+2347044444561\",\r

          \    \"website\": \"https://www.truthFarm.com\",\r

          \    \"type\": \"emailOtp\"\r

          }"
    response:
      statusText: "201"
      headers:
        - name: Vary
          value: Origin
        - name: Content-Security-Policy
