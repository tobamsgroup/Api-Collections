info:
  name: Refresh Token
  type: http
  seq: 13

http:
  method: POST
  url: "{{BASE}}/auth/refresh_user"
  body:
    type: json
    data: |-
      {
          "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2ODllZmJiOTI5NWY0MjA5YjcxYmM2ZTAiLCJlbWFpbCI6ImZhd2F6LmFiZGdhbml5dStvcmdAdG9iYW1zZ3JvdXAuY29tIiwicm9sZSI6Ik9yZ2FuaXNhdGlvbiIsImlhdCI6MTc1NTc2MTQyNCwiZXhwIjoxNzU2MzY2MjI0fQ.lzit3SW1HjpHKS_mezf4SzPrK3I4IiCJlbu7PKRiGPw"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setEnvVar("access", res.getBody().data.accessToken);
        bru.setEnvVar("refresh", res.getBody().data.refreshToken);

        if (res.getBody().data.role === "Organisation"){
            bru.setEnvVar("org_access", res.getBody().data.accessToken);
            bru.setEnvVar("org_refresh", res.getBody().data.refreshToken);
        }

        if (res.getBody().data.role === "Intern"){
            bru.setEnvVar("intern_access", res.getBody().data.accessToken);
            bru.setEnvVar("intern_refresh", res.getBody().data.refreshToken);
        }

        if (res.getBody().data.role === "Talent"){
            bru.setEnvVar("talent_access", res.getBody().data.accessToken);
            bru.setEnvVar("talent_refresh", res.getBody().data.refreshToken);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

