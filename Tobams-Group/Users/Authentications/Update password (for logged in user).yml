info:
  name: Update password (for logged in user)
  type: http
  seq: 19

http:
  method: PATCH
  url: "{{BASE}}/auth/forgot-password"
  body:
    type: json
    data: |-
      {
          "userId": "690b9906ea45abf381cde4ab",
          "currentPassword": "Password123!",
          "newPassword": "Password123!"
      }
  auth:
    type: bearer
    token: "{{intern_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

