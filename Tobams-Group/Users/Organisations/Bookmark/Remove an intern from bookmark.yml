info:
  name: Remove an intern from bookmark
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{BASE}}/organisation/tech-talents/67b65c0c2478ee6593c4983a/bookmark?role=intern&bookmark=false"
  params:
    - name: role
      value: intern
      type: query
    - name: bookmark
      value: "false"
      type: query
  auth:
    type: bearer
    token: "{{client_access}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        test('"savedMentees" includes the menteeId from request parameters', function () {
                const internId = req.getUrl().path[4]
                expect(res.getBody().data.savedInterns).to.not.include(internId);
            }
        );

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
