info:
  name: Get all saved talents
  type: http
  seq: 6

http:
  method: GET
  url: "{{BASE}}/organisation/tech-talents/bookmarks?role=talent"
  params:
    - name: role
      value: talent
      type: query
  auth:
    type: bearer
    token: "{{client_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
