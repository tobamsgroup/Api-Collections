info:
  name: find all users with pagination
  type: http
  seq: 6

http:
  method: GET
  url: "{{URL}}/all/all?pageNumber=0&limit=10"
  params:
    - name: pageNumber
      value: "0"
      type: query
    - name: limit
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
