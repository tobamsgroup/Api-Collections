  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Update personal info
    request:
      url: "{{BASE}}/mentors"
      method: PATCH
      body:
        type: json
        data: |-
          {
              "firstName": "Fawaz",
              "lastName": "Agara",
              "title": "Software Engineer",
              "yearsOfExperience": "3-5 years",
              "telephone": "+23479656740",
              "linkedInURL": "https://delicious-solutions.info/",
              "linkText": "linkedIn profile"

          }
    response:
      body:
        type: text
        data: ""
  - name: Update bio
    request:
      url: "{{BASE}}/mentors"
      method: PATCH
      body:
        type: json
        data: "{\r

          \    \"bio\": \"Experienced technology mentor with 10+ years in software development\" // Required, max 1000 chars\r

          }"
    response:
      body:
        type: text
        data: ""
  - name: Update areas of expertise
    request:
      url: "{{BASE}}/mentors"
      method: PATCH
      body:
        type: json
        data: "{\r

          \    \"areasOfExpertise\": [\"Web Development\", \"Software Engineering\"]\r

          }"
    response:
      body:
        type: text
        data: ""
  - name: Update mentorship preference
    request:
      url: "{{BASE}}/mentors"
      method: PATCH
      body:
        type: json
        data: "{\r

          \    \"mentorshipType\": [\"Group\", \"One-to-one\"], // e.g \"Group\" or \"One-to-one\" or \"Group, One-to-one\"\r

          \    \"industry\": [\"Engineering\"]\r

          }"
    response:
      body:
        type: text
        data: ""
  - name: Update availability
    request:
      url: "{{BASE}}/mentors"
      method: PATCH
      body:
        type: json
        data: "{\r

          \    \"availability\": [\r

          \        {\r

          \            \"days\": [\"MON\", \"TUE\"],\r

          \            \"times\": [\"10:00 AM\", \"1:00 PM\", \"10:00 PM\"]\r

          \        },\r

          \        // {\r

          \        //     \"days\": [\"WEEKENDS\"],\r

          \        //     \"times\": [\"10:00 AM\", \"1:00 PM\", \"10:00 PM\"]\r

          \        // },\r

          \        {\r

          \            \"days\": [\"MON\", \"TUE\"],\r

          \            \"times\": [\"10:00 AM - 1:00 PM\", \"10:00 PM\"]\r

          \        },\r

          \        {\r

          \            \"days\": [\"MON\", \"TUE\"],\r

          \            \"times\": [\r

          \                \"10:00 AM\",\r

          \                \"1:00 PM\",\r

          \                \"10:00 PM\"\r

          \            ],\r

          \            \"_id\": \"67b84d72ab89ac59aaf73a0f\"\r

