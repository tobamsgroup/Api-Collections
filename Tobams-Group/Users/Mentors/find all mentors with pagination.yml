info:
  name: find all mentors with pagination
  type: http
  seq: 4

http:
  method: GET
  url: "{{BASE}}/mentors?pageNumber=1&limit=10"
  params:
    - name: pageNumber
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
  auth:
    type: bearer
    token: "{{mentor_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
