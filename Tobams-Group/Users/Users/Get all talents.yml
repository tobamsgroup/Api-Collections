info:
  name: Get all talents
  type: http
  seq: 4

http:
  method: GET
  url: "{{BASE}}/talents?page=1&limit=10"
  params:
    - name: page
      value: "1"
      type: query
      description: Default to 1
    - name: limit
      value: "10"
      type: query
      description: Default to 10
  auth:
    type: bearer
    token: "{{client_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
