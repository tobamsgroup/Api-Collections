info:
  name: Get potential peer for Peer-to-Peer mentorship
  type: http
  seq: 10

http:
  method: GET
  url: "{{BASE}}/users/potential-peers?userId="
  params:
    - name: userId
      value: ""
      type: query
  auth:
    type: bearer
    token: "{{talent_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

