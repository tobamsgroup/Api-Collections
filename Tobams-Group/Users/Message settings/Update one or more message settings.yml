info:
  name: "Update one or more message settings "
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{BASE}}/users/message-settings"
  body:
    type: json
    data: |-
      {
        "lastSeenVisibility": ["Mentors", "Everyone"]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

