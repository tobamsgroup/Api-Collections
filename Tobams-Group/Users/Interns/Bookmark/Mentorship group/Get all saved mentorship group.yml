                      "aboutGroup": "Group Focus\nThis group is dedicated to nurturing aspiring and experienced product designers who are passionate about crafting intuitive, user-friendly digital experiences. Our focus is on building strong foundations in UI/UX design, from understanding the fundamentals of design principles to mastering advanced tools like Figma and Sketch. You'll dive deep into user research, wireframing, prototyping, and usability testing, all while learning how to communicate effectively with stakeholders and developers.\n\nKey Topics Covered\n-User Research & Empathy Mapping\n-Wireframing & Prototyping\n-Visual Design Principles\n-Usability Testing\n-Design Systems\n-Collaboration with Developers\n\nWhy join?\nWhether you’re new to the field or looking to refine your design skills, this group provides hands-on guidance to enhance your portfolio and prepare for real-world challenges. With personalized feedback on your design projects and collaborative group critiques, you’ll gain the confidence and expertise to take on complex design problems.\n\nAvailability\nWe offer weekly mentoring sessions, design sprints, and interactive workshops. Flexible time slots are available to accommodate different schedules.",
