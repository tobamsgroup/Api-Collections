http:
  method: PATCH
  url: "{{BASE}}/interns"
  body:
    type: json
    data: |-
      {
          // "skills": ["JavaScript", "AWS"],
          "skills": ["Reactjs", "Nextjs", "Tailwind CSS", "Redux"],
          "bio": "String",
          "portfolioLink": "https://example.com/portfolio",
          "linkText": "View my portfolio",
          "occupation": "Software Engineer",
          "internshipPreferences": {
              "role": ["Software Developer", "Data Analyst"],
              "industryOfInterest": ["Technology", "Finance"],
              "preferredLocation": ["New York", "San Francisco"],
              "workMode": ["Remote"],
              "duration": ["6 months"],
              "internshipType": ["Full-time"]
