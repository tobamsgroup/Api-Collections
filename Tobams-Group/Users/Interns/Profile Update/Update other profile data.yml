              "industryOfInterest": ["Technology", "Healthcare"],
              "experienceLevel": ["Mid-Level"],
              "mentorshipType": ["Group"]
          },
          "yearsOfExperience": "2 years"
      }
  auth:
    type: bearer
    token: "{{intern_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

