info:
  name: Current user
  type: http
  seq: 4

http:
  method: GET
  url: "{{BASE}}/interns/me"
  headers:
    - name: Authorization
      value: Bearer {{intern_access}}
      disabled: true
  auth:
    type: bearer
    token: "{{intern_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
