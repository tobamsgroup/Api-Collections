info:
  name: Update certificattion
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{BASE}}/talents/?update=add"
  params:
    - name: update
      value: add
      type: query
  body:
    type: json
    data: |-
      {
          "certification":
          {
            "certificateTitle": "Certified JavaScript Developer",
            "institution": "Certification Authority",
            "dateObtained": "2021-01-01",
            "expiryDate": "2023-01-01",
            "link": ""
          }
      }
  auth:
    type: bearer
    token: "{{talent_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
