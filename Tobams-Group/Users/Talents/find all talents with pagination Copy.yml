info:
  name: find all talents with pagination Copy
  type: http
  seq: 8

http:
  method: GET
  url: "{{BASE}}/talents/?page=1&limit=11"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "11"
      type: query
  auth:
    type: bearer
    token: "{{talent_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
