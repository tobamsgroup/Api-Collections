info:
  name: Upload a resume
  type: http
  seq: 1

http:
  method: PATCH
  url: "{{BASE}}/talents/resumes"
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value:
          - postman-cloud:///1ef90d38-f8eb-4bd0-aa84-02f9d1b40ded
  auth:
    type: bearer
    token: "{{talent_access}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

